# trading_params.yaml — Polymarket 交易參數

# Fee 定案（2026-04-08）
# 來源：https://docs.polymarket.com/trading/fees（Upcoming Fee Structure，2026-03-30 生效）
# Weather 行：fee_rate=0.025, exponent=0.5, maker_rebate=25%
# 數學驗算：3 筆官方費率表數字（p=0.10/0.50/0.90）全部吻合
# API /fee-rate 回傳 base_fee=1000（簽名用 bps，非 EV 計算用 feeRate）
fee_mode: manual_hardcoded
fee_basis: official_docs_2026_04_08
fee_rate: 0.025        # Weather taker fee rate（已定案，官方費率表驗證）
fee_exponent: 0.5      # fee 公式指數（已定案）
fee_maker: 0           # Maker 不收 fee
fee_maker_rebate: 0.25 # Maker rebate = taker fee 的 25%

min_edge: 0.03        # 最小進場門檻
kelly_fraction: 0.25  # 1/4 Kelly
bankroll: 10000       # 用於計算 Kelly 下注金額（紙上交易用）
hurdle_rate: 0        # per-hour reinvestment yield（第一版設 0，不折現）

# STEP 9 深度分析參數
depth_fixed_usd: 200        # fixed_depth 模式預設金額（分析用，非 alert 門檻）
depth_ema_alpha: 0.3         # EMA 平滑係數（預留，第一版不啟用）
depth_ema_enabled: false     # EMA 是否啟用（第一版 false）

# STEP 10 通報設定
alert_min_edge: 0.99               # 最小進場 edge（0.99 = 暫時關閉推送）
alert_min_depth_usd: 100           # 最小 sweet_spot 深度（USD）
alert_require_positive_ev: true    # 要求 sweet_spot_ev > 0
alert_cooldown_minutes: 10         # 同一 (market_id, signal_action) 的最短間隔（分鐘）
alert_min_settlement_hours: 2      # 距結算最少小時數
alert_max_per_city_per_cycle: 3    # 每城市每輪最多推送筆數
alert_max_total_per_cycle: 10      # 每輪全局最多推送筆數
alert_cities: all_ready            # "all_ready"（目前唯一支援值）

# Signal 安全閘門
signal_suppress_hours: 6            # < 6h → too_close_to_settlement（完全壓制）
signal_warning_hours: 8             # 6-8h → last_forecast_warning（正常判斷，顯示在預警頁）
signal_min_settlement_hours: 8      # 舊鍵保留（向後相容，不影響邏輯）
signal_extreme_price_threshold: 0.95  # 任一邊 > 95¢ 視為市場已定局

# Ready 門檻（4.1）
ready_min_error_rows: 730          # 約 2 年，覆蓋完整夏冬循環
ready_max_forecast_age_days: 7     # latest error_table date 距今最多幾天

# Backfill（4.4）
backfill_start_date: "2023-01-01"  # 新城市回補預設起始日

# Edge 縮水通知門檻
position_edge_shrink_threshold: 0.10  # edge 降到此比例以下時推送 🟡 通知

# === Remaining Gain 機率模型（v7.5，2026-04-11）===
# 在距結算 <= remaining_gain_max_lead_hours 時，用 GFS 歷史 ECDF 取代 ECDF 機率
remaining_gain_enabled: true
remaining_gain_max_lead_hours: 6         # 只在 <= 6h 啟用（suppress 窗口剛好重疊）
remaining_gain_min_local_hour: 7         # local_hour < 7 不啟用（7AM 前 obs 可信度低）
remaining_gain_obs_max_age_minutes: 20   # obs fetched_at 超過 20 分鐘 → fallback
remaining_gain_obs_time_max_age_minutes: 30  # obs_time 超過 30 分鐘 → fallback
remaining_gain_min_bucket_samples: 30    # bucket 樣本 < 30 → fallback

# === 即時觀測邏輯裁剪（2026-04-09）===
use_current_obs: true                        # 啟用 WU v3 即時觀測邏輯裁剪
current_obs_default_ttl_seconds: 1800        # 正常城市快取 30 分鐘（節省 API quota）
current_obs_settling_ttl_seconds: 600        # 結算中城市快取 10 分鐘（更頻繁更新）
current_obs_cache_ttl_seconds: 1800          # 向後相容（signal_main 舊版讀取）
